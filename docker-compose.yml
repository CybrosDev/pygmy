services:

  pygmy:
    image: pygmy
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PYTHON_ENV=production
      - FLASK_ENV=production
      - DEBUG=False
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - 1500:8000
    volumes:
      - .:/pygmy
    command: gunicorn --log-file /var/log/pygmy/error_logs.log --access-logfile /var/log/pygmy/acclogs.log --log-level DEBUG --bind 0.0.0.0:9119 --workers 2 pygmy.rest.wsgi:app
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 9119)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  pygmyui:
    image: pygmyui
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PYTHON_ENV=production
      - FLASK_ENV=production
      - DEBUG=False
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - 1501:8000
    command: sh -c "cd pygmyui && gunicorn --log-file /var/log/pygmy/uierror_logs.log --access-logfile /var/log/pygmy/uiacclogs.log --bind 0.0.0.0:8000 --workers 2 pygmyui.wsgi && cd .."
    depends_on:
      pygmy:
        condition: service_healthy
